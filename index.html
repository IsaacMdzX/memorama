<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Memorama Sistemas - Full View</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --bg: #f0f3f7;
            --gradient: linear-gradient(135deg, #6c5ce7 0%, #8e44ad 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* Altura total de la pantalla */
            width: 100vw;
            overflow: hidden; /* Prohibido el scroll */
            padding: 10px;
        }

        h1 { 
            font-size: 1.4rem; 
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        /* --- PANEL DE CONTROL COMPACTO --- */
        .control-panel {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 10px 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .progress-container {
            background: #e2e8f0;
            border-radius: 50px;
            height: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.4s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .stat-val { color: var(--primary); }

        .btn-reset {
            background: var(--primary);
            color: white; border: none;
            padding: 6px 15px; border-radius: 50px;
            cursor: pointer; font-size: 0.8rem; font-weight: 600;
        }

        /* --- TABLERO QUE SE AJUSTA AL ALTO (NO SCROLL) --- */
        .game-board {
            display: grid;
            flex-grow: 1; /* Ocupa el espacio restante */
            width: 100%;
            max-width: 900px;
            /* 4 columnas en móvil para que no sean tan largas hacia abajo */
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            perspective: 1000px;
            padding-bottom: 10px;
        }

        /* --- TARJETAS DINÁMICAS --- */
        .card {
            width: 100%;
            height: 100%; /* Se estira según el grid */
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 10px;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-back {
            background: var(--gradient);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .card-back::after {
            content: "?";
            font-size: 2rem;
            font-weight: 700;
        }

        .card-front {
            background: #ffffff;
            transform: rotateY(180deg);
            border: 1px solid #edf2f7;
        }

        .card-icon { font-size: 1.2rem; margin-bottom: 2px; }
        .card-text { 
            font-size: 0.65rem; 
            line-height: 1.1; 
            font-weight: 600; 
            color: #2d3436;
            word-wrap: break-word;
        }

        .card.matched .card-front { background: #e6fffa; border-color: var(--success); }

        /* --- AJUSTES PARA PC --- */
        @media (min-width: 801px) {
            h1 { font-size: 2.2rem; }
            .game-board { 
                grid-template-columns: repeat(5, 1fr); 
                grid-template-rows: repeat(4, 1fr);
                gap: 15px;
            }
            .card-icon { font-size: 2.5rem; }
            .card-text { font-size: 0.95rem; }
            .card-back::after { font-size: 4rem; }
            .control-panel { padding: 20px; }
            .stats-row { font-size: 1.2rem; }
        }

        /* --- MODAL --- */
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: none;
            align-items: center; justify-content: center; z-index: 100;
        }

        .modal {
            background: white; padding: 30px; border-radius: 20px;
            text-align: center; width: 85%; max-width: 400px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <h1>Planificación: El Juego</h1>

    <div class="control-panel">
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="stats-row">
            <span>Pares: <span id="matchesText" class="stat-val">0/10</span></span>
            <span>Pasos: <span id="movesText" class="stat-val">0</span></span>
            <button class="btn-reset" onclick="initGame()">Reiniciar</button>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="overlay" id="overlay">
        <div class="modal">
            <div style="font-size: 3rem;">🏆</div>
            <h2 style="color: var(--success); margin: 10px 0;">¡Lo lograste!</h2>
            <p>Completaste el reto de sistemas.</p>
            <p style="font-weight: bold; margin: 10px 0;">Movimientos: <span id="finalMoves">0</span></p>
            <button class="btn-reset" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        const pairsData = [
            { a: "Planificación", b: "Organizar actividades y recursos.", icon: "📅" },
            { a: "Sin Planear", b: "Errores, retrasos o fracaso total.", icon: "⚠️" },
            { a: "Objetivo", b: "Meta principal del sistema.", icon: "🎯" },
            { a: "Importancia", b: "Da dirección y evita desviaciones.", icon: "🧭" },
            { a: "Específico", b: "Objetivo claro, preciso y sin dudas.", icon: "🔍" },
            { a: "Medible", b: "Evalúa cumplimiento con datos.", icon: "📊" },
            { a: "Temporal", b: "Define un tiempo límite de entrega.", icon: "⏱️" },
            { a: "Objetivo General", b: "La meta global del proyecto.", icon: "🌐" },
            { a: "O. Específicos", b: "Pasos manejables del proyecto.", icon: "🧩" },
            { a: "Recursos", b: "Definidos por la planificación.", icon: "🤝" }
        ];

        let flippedCards = [], matches = 0, moves = 0, lock = false;

        function updateUI() {
            document.getElementById('matchesText').textContent = `${matches}/10`;
            document.getElementById('movesText').textContent = moves;
            document.getElementById('progressBar').style.width = (matches * 10) + "%";
        }

        function initGame() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            flippedCards = []; matches = 0; moves = 0; lock = false;
            updateUI();

            let cards = [];
            pairsData.forEach((p, i) => {
                cards.push({ text: p.a, id: i, icon: p.icon });
                cards.push({ text: p.b, id: i, icon: p.icon });
            });
            cards.sort(() => Math.random() - 0.5);

            cards.forEach(data => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = data.id;
                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        <span class="card-icon">${data.icon}</span>
                        <span class="card-text">${data.text}</span>
                    </div>
                `;
                card.onclick = () => {
                    if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                    card.classList.add('flipped');
                    flippedCards.push(card);
                    if (flippedCards.length === 2) {
                        moves++; updateUI(); lock = true;
                        if (flippedCards[0].dataset.id === flippedCards[1].dataset.id) {
                            flippedCards.forEach(c => c.classList.add('matched'));
                            matches++; flippedCards = []; lock = false;
                            updateUI();
                            if (matches === 10) {
                                document.getElementById('finalMoves').textContent = moves;
                                setTimeout(() => document.getElementById('overlay').style.display='flex', 500);
                            }
                        } else {
                            setTimeout(() => {
                                flippedCards.forEach(c => c.classList.remove('flipped'));
                                flippedCards = []; lock = false;
                            }, 800);
                        }
                    }
                };
                board.appendChild(card);
            });
        }

        function closeModal() { document.getElementById('overlay').style.display = 'none'; }
        initGame();
    </script>
</body>
</html>
